name: Test source

description: This GitHub Action tests sources and uploads reports

runs:
  using: composite
  steps:
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.x
    - name: Restore server
      shell: pwsh
      run: dotnet restore
      working-directory: source/server
    - name: Test server
      shell: pwsh
      run: |
        dotnet test `
          Karamem0.Commistant.Test/Karamem0.Commistant.Test.csproj `
          -p:AltCover=true `
          -p:AltCoverLocalSource=true `
          -- NUnit.TestOutputXml=${{github.workspace}}/source/server/test
      working-directory: source/server
    - name: Test results
      uses: enricomi/publish-unit-test-result-action/linux@d0a4676d0e0b938bc201470d88276b7c74c712b3
      if: always()
      with:
        files: source/server/test/*.xml
        check_name: Bot test results
    - name: Upload coverage reports
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
      if: always()
      with:
        fail_ci_if_error: true
        token: ${{env.CODECOV_TOKEN}}
        slug: karamem0/commistant
